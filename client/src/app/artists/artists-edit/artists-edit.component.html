<div *ngIf="editArtist!=null" class="modal fade show" tabindex="-1" aria-labelledby="exampleModalLiveLabel" aria-modal="true" role="dialog" style="display: block;">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLiveLabel">Modal title</h5>
        <button type="button" class="btn-close" (click)="editArtist = null" aria-label="Close"></button>
      </div>
      <div class="modal-body">

        <div class="mb-3">
          <label class="form-label">Artist name</label>
          <input class="form-control" [(ngModel)]="editArtist.artistName">
        </div>

        <div class="mb-3">
          <label class="form-label">Date of birth</label>
          <input class="form-control" [(ngModel)]="editArtist.dateOfBirth">
        </div>

        <div class="mb-3">
          <label class="form-label">Gender</label>
          <input class="form-control" [(ngModel)]="editArtist.gender">
        </div>

        <div class="mb-3">
          <label class="form-label">About</label>
          <input class="form-control" [(ngModel)]="editArtist.about">
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-primary" (click)="saveChanges()">Save changes</button>
      </div>

    </div>
  </div>
</div>
